
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My First App Build: Code Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@0;1&family=Elsie&family=Xanh+Mono&display=swap" rel="stylesheet">

  <style>
  
        :root {
            /* Colors */
            --color-pink: #FFB3D9;
            --color-pink-light: #FFDDF0;
            --color-pink-dark: #FF8FC7;
            --color-lavender: #D4BFFF;
            --color-lavender-light: #E8DDFF;
            --color-lavender-dark: #B899FF;
            --color-mint: #B3F5E6;
            --color-mint-light: #D6FFF5;
            --color-mint-dark: #8EEBD8;
            --color-blue: #A8D8FF;
            --color-blue-light: #C9E7FF;
            --color-blue-dark: #7BC4FF;
            --color-peach: #FFD4B8;
            --color-peach-light: #FFE6D5;
            --color-peach-dark: #FFC29A;
            --color-code-block: #3f3f3f;
        
            
            /* Gradients */
            --gradient-pink-blue: linear-gradient(135deg, #FFB3D9 0%, #A8D8FF 100%);
            --gradient-mint-blue: linear-gradient(135deg, #B3F5E6 0%, #A8D8FF 100%);
            --gradient-lavender-pink: linear-gradient(135deg, #D4BFFF 0%, #FFB3D9 100%);
            --gradient-peach-pink: linear-gradient(135deg, #FFD4B8 0%, #FFB3D9 100%);
            --gradient-blue-lavender: linear-gradient(135deg, #A8D8FF 0%, #D4BFFF 100%);
            
           --text-xdark: #3d3d3d;
 --text-dark: #4b4b4b;
              --text-medium: #5b5b5b;
  --text-light: #6c6c6c;
  --text-xlight: #7c7c7c;
  --text-2xlight: #e8e8e8; 
  
  
            /* Spacing */
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --space-2xl: 48px;
            --space-3xl: 64px;
            
            /* Border Radius */
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --radius-2xl: 48px;
            --radius-full: 9999px;
            
            /* Borders */
--border-subtle: 1px solid rgba(255, 255, 255, 0.15);
--border-medium: 1px solid rgba(255, 255, 255, 0.3);
--border-strong: 1px solid rgba(255, 255, 255, 0.5);
/* Glowing Borders */
--border-glow-pink: 2px solid var(--color-pink);
--border-glow-pink-shadow: 0 0 14px rgba(255, 179, 217, 0.4);
--border-glow-lavender: 2px solid var(--color-lavender);
  --border-glow-lavender-shadow: 0 0 14px rgba(212, 191, 255, 0.4);
--border-glow-mint: 2px solid var(--color-mint);
  --border-glow-mint-shadow: 0 0 14px rgba(179, 245, 230, 0.4);
            
            /* Typography */
          
            --font-primary: "Elsie", serif;
            --font-secondary: "Cormorant Garamond", serif;
            --font-mono: "Xanh Mono", monospace;
            --font-size-xs: 12px;
            --font-size-sm: 14px;
            --font-size-base: 16px;
            --font-size-lg: 18px;
            --font-size-xl: 20px;
            --font-size-2xl: 24px;
            --font-size-3xl: 32px;
            --font-size-4xl: 40px;
            --font-size-5xl: 48px;
            --font-weight-light: 300;
            --font-weight-normal: 400;
      
            
            /* Shadows */
            --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 8px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 16px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 12px 24px rgba(0, 0, 0, 0.12);
            --shadow-2xl: 0 24px 48px rgba(0, 0, 0, 0.15);
            --shadow-pink: 0 8px 24px rgba(255, 179, 217, 0.3);
            --shadow-lavender: 0 8px 24px rgba(212, 191, 255, 0.3);
            --shadow-mint: 0 8px 24px rgba(179, 245, 230, 0.3);
            
            /* Glassmorphism */
            --blur-sm: 8px;
            --blur-md: 16px;
            --blur-lg: 24px;
            --blur-xl: 32px;
            --glass-white: rgba(255, 255, 255, 0.7);
            --glass-white-light: rgba(255, 255, 255, 0.5);
            --glass-white-lighter: rgba(255, 255, 255, 0.3);
      
       /* Opacity */
    --opacity-soft: .85;
--opacity-glass: .65;
--opacity-faint: .45;
            
            /* Animations */
            --duration-fast: 150ms;
            --duration-normal: 250ms;
            --duration-slow: 350ms;
            --ease-out: cubic-bezier(0, 0, 0.2, 1);
            --ease-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
            
            --transition-fast: 0.18s ease;
  --transition-med: 0.28s ease;
    --transition-slow: 0.32s ease;
            
            /* z-index */
--z-base: 0;
--z-dropdown:100;
--z-sticky: 200;
--z-overlay: 300;
--z-modal :400;
--z-toast: 500;
--z-tooltip: 600;
        }
        
*{
     margin: 0;
     padding: 0; 
     box-sizing: border-box;
     }
     
     html, body{
           background:
                radial-gradient(at 20% 30%, rgba(255, 179, 217, 0.4) 0px, transparent 50%),
                radial-gradient(at 80% 20%, rgba(212, 191, 255, 0.35) 0px, transparent 50%),
                radial-gradient(at 40% 70%, rgba(179, 245, 230, 0.35) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(168, 216, 255, 0.4) 0px, transparent 50%),
                radial-gradient(at 10% 90%, rgba(255, 212, 184, 0.3) 0px, transparent 50%);
  background-size: 400% 400%;
  animation: pastelFlow 18s ease infinite;
  color: #3d3d3d;
}

@keyframes pastelFlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}




     .container{
     width: 100%;
     height: 100%;
     padding: 20px;
     display: flex;
     }
     .left, .right{
     flex-basis: 50%;
     padding: 10px;
     }
     textarea{
     width: 100%;
     height: 28%;
     background: rgba(255, 255, 255, 0.5);
     color: #4b4b4b;
     padding: 10px 20px;
     border:1px solid rgba(255, 255, 255, 0.5);
     box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
     font-size: 14px;
     margin-bottom: 30px;
     font-family: var(--font-mono);
     border-radius: 0px 0px 30px 30px;
     }
     
     iframe{
     width: 100%;
     height: 93.5%;
     background: rgba(255, 255, 255, 0.5);
     border: 1px solid rgba(255, 255, 255, 0.5);
          box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
          font-family: var(--font-secondary);
               border-radius: 0px 0px 30px 30px;
       
     }
     
     label svg{
     margin-right: 8px;
     margin-left: 20px;
     
     }
     
label{
font-family: var(--font-primary);
 text-shadow: 1px 5px 5px rgba(0, 0, 0, 0.3), 0px 10px 10px rgba(0, 0, 0, 0.1);
color: #ffffff;
display: flex; 
align-items: center; 
background: #B899FF;
height: 30px; 
box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
border-radius: 50px 50px 0px 0px;
}


  </style>
</head>
<body>
<header class=" w-full sca overflow-hidden" style="background: radial-gradient(at 20% 30%, rgba(255, 179, 217) 0px, transparent 80%),
                radial-gradient(at 80% 20%, rgba(212, 191, 255) 0px, transparent 80%),
                radial-gradient(at 40% 70%, rgba(179, 245, 230) 0px, transparent 80%),
                radial-gradient(at 90% 80%, rgba(168, 216, 255) 0px, transparent 80%),
                radial-gradient(at 10% 90%, rgba(255, 212, 184) 0px, transparent 80%); font-family: var(--font-primary); text-shadow: 1px 5px 5px rgba(0, 0, 0, 0.3), 0px 10px 10px rgba(0, 0, 0, 0.1);
                box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
                border-radius: 20px 20px 20px 20px;
                border: 1px solid rgba(255, 255, 255, 0.15);
color: #ffffff;
font-size: 24px;
font-weight: 400; padding: 20px 50px 20px 650px">
<h1>VisualCode </h1>
</header>
<div class="container">
<div class="left">
<label><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#ffffff" box-shadow="1px 5px 5px rgba(0, 0, 0, 0.3), 0px 10px 10px rgba(0, 0, 0, 0.1)"><path d="M320-240 80-480l240-240 57 57-184 184 183 183-56 56Zm320 0-57-57 184-184-183-183 56-56 240 240-240 240Z"/></svg>HTML</label>
<textarea id="html-code"" onkeyup="run( )"></textarea>

<label><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#ffffff"><path d="M336-240 96-480l240-240 51 51-189 189 189 189-51 51Zm288 0-51-51 189-189-189-189 51-51 240 240-240 240Z"/></svg>CSS</label>
<textarea id="css-code"  onkeyup="run( )"></textarea>

<label><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#FFffff"><path d="M336-240 96-480l240-240 51 51-189 189 189 189-51 51Zm288 0-51-51 189-189-189-189 51-51 240 240-240 240Z"/></svg>JavaScript</label>
<textarea id="js-code"  onkeyup="run( )"></textarea>
</div>

<div class="right">
<label><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#ffffff"><path d="M189-160q-60 0-102.5-43T42-307q0-9 1-18t3-18l84-336q14-54 57-87.5t98-33.5h390q55 0 98 33.5t57 87.5l84 336q2 9 3.5 18.5T919-306q0 61-43.5 103.5T771-160q-42 0-78-22t-54-60l-28-58q-5-10-15-15t-21-5H385q-11 0-21 5t-15 15l-28 58q-18 38-54 60t-78 22Zm3-80q19 0 34.5-10t23.5-27l28-57q15-31 44-48.5t63-17.5h190q34 0 63 18t45 48l28 57q8 17 23.5 27t34.5 10q28 0 48-18.5t21-46.5q0 1-2-19l-84-335q-7-27-28-44t-49-17H285q-28 0-49.5 17T208-659l-84 335q-2 6-2 18 0 28 20.5 47t49.5 19Zm376.5-291.5Q580-543 580-560t-11.5-28.5Q557-600 540-600t-28.5 11.5Q500-577 500-560t11.5 28.5Q523-520 540-520t28.5-11.5Zm80-80Q660-623 660-640t-11.5-28.5Q637-680 620-680t-28.5 11.5Q580-657 580-640t11.5 28.5Q603-600 620-600t28.5-11.5Zm0 160Q660-463 660-480t-11.5-28.5Q637-520 620-520t-28.5 11.5Q580-497 580-480t11.5 28.5Q603-440 620-440t28.5-11.5Zm80-80Q740-543 740-560t-11.5-28.5Q717-600 700-600t-28.5 11.5Q660-577 660-560t11.5 28.5Q683-520 700-520t28.5-11.5Zm-367 63Q370-477 370-490v-40h40q13 0 21.5-8.5T440-560q0-13-8.5-21.5T410-590h-40v-40q0-13-8.5-21.5T340-660q-13 0-21.5 8.5T310-630v40h-40q-13 0-21.5 8.5T240-560q0 13 8.5 21.5T270-530h40v40q0 13 8.5 21.5T340-460q13 0 21.5-8.5ZM480-480Z"/></svg>Live Output</label>
<iframe id="output"></iframe>
</div>
</div>
<footer  style="background: radial-gradient(at 20% 30%, rgba(255, 179, 217) 0px, transparent 80%),
                radial-gradient(at 80% 20%, rgba(212, 191, 255) 0px, transparent 80%),
                radial-gradient(at 40% 70%, rgba(179, 245, 230) 0px, transparent 80%),
                radial-gradient(at 90% 80%, rgba(168, 216, 255) 0px, transparent 80%),
                radial-gradient(at 10% 90%, rgba(255, 212, 184) 0px, transparent 80%); height: 6vh;  box-shadow: 8px 0px 16px rgba(0, 0, 0, 0.15);
                border: 1px solid rgba(255, 255, 255, 0.15);
                border-radius: 20px 20px 20px 20px">
</footer>
  <script>
  function run( ){
  let htmlCode = document.getElementById("html-code").value;
   let cssCode = document.getElementById("css-code").value;
    let jsCode = document.getElementById("js-code").value;
     let output = document.getElementById("output");
     
     output.contentDocument.body.innerHTML = htmlCode + "<style>"+cssCode  +"</style>";
     output.contentWindow.eval(jsCode); 
  }
  </script>

</body>
</html>
